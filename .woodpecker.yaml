when:
  - event: [push, pull_request]
    branch: main

steps:
  - name: type-check
    image: node:22-slim
    commands:
      - npm ci
      - npm run type-check

  - name: notify-success
    image: alpine:3.21
    when:
      - status: success
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - apk add --no-cache curl
      - >
        curl -sf --connect-timeout 5 --max-time 15
        -H "Content-Type: application/json"
        -d "{\"embeds\":[{\"title\":\"✅ $CI_REPO #$CI_PIPELINE_NUMBER\",\"description\":\"**Branch:** $CI_COMMIT_BRANCH\n**Commit:** \`$(echo $CI_COMMIT_SHA | cut -c1-7)\`\",\"color\":3066993,\"url\":\"$CI_PIPELINE_URL\"}]}"
        "$DISCORD_WEBHOOK_URL" || true

  - name: notify-failure
    image: alpine:3.21
    when:
      - status: failure
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - apk add --no-cache curl
      - >
        curl -sf --connect-timeout 5 --max-time 15
        -H "Content-Type: application/json"
        -d "{\"embeds\":[{\"title\":\"❌ $CI_REPO #$CI_PIPELINE_NUMBER\",\"description\":\"**Branch:** $CI_COMMIT_BRANCH\n**Commit:** \`$(echo $CI_COMMIT_SHA | cut -c1-7)\`\",\"color\":15158332,\"url\":\"$CI_PIPELINE_URL\"}]}"
        "$DISCORD_WEBHOOK_URL" || true
