apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"

configMapGenerator:
  - name: cassandra-dashboards-home
    files:
      - home.json
  - name: cassandra-dashboards-orchestrator
    files:
      - orchestrator.json
  - name: cassandra-dashboards-sessions
    files:
      - sessions.json
  - name: cassandra-dashboards-yt-mcp
    files:
      - yt-mcp.json
  - name: cassandra-dashboards-workers
    files:
      - workers.json
